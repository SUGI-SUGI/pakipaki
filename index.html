<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>カンバンボード</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="container">
      <header>
        <h1>カンバンボード</h1>
        <button id="addTaskBtn" class="btn">タスクを追加</button>
      </header>

      <div class="board">
        <div class="column" id="todo">
          <h2>To Do</h2>
          <div class="task-list" data-status="todo"></div>
        </div>
        <div class="column" id="in-progress">
          <h2>In Progress</h2>
          <div class="task-list" data-status="in-progress"></div>
        </div>
        <div class="column" id="done">
          <h2>Done</h2>
          <div class="task-list" data-status="done"></div>
        </div>
      </div>
    </div>

    <!-- タスク追加・編集モーダル -->
    <div id="taskModal" class="modal">
      <div class="modal-content">
        <h2 id="modalTitle">タスクを追加</h2>
        <form id="taskForm">
          <div class="form-group">
            <label for="taskTitle">タイトル</label>
            <input type="text" id="taskTitle" required>
          </div>
          <div class="form-group">
            <label for="taskDescription">説明</label>
            <textarea id="taskDescription" required></textarea>
          </div>
          <div class="form-group">
            <label for="taskStatus">ステータス</label>
            <select id="taskStatus">
              <option value="todo">To Do</option>
              <option value="in-progress">In Progress</option>
              <option value="done">Done</option>
            </select>
          </div>
          <div class="form-actions">
            <button type="button" class="btn btn-secondary" id="cancelBtn">キャンセル</button>
            <button type="submit" class="btn btn-primary">保存</button>
          </div>
        </form>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
